<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DrawTabData Explorer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
      background: #f5f5f5;
      color: #222;
    }

    h1 { margin-bottom: 16px; }

    /* --- Pipeline --- */

    .pipeline {
      margin-bottom: 20px;
    }

    .pipeline-source {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #2563eb;
      color: #fff;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .pipeline-source .count {
      font-weight: 400;
      opacity: 0.8;
      color: #fff;
    }

    .pipe-connector {
      display: flex;
      align-items: center;
      padding: 2px 0 2px 18px;
      color: #999;
      font-size: 18px;
      line-height: 1;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 14px;
    }

    .step-type {
      font-weight: 600;
      color: #6b21a8;
      min-width: 60px;
      padding-top: 4px;
    }

    .step-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      flex: 1;
    }

    .step-controls select,
    .step-controls input {
      padding: 4px 8px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .step-controls input {
      width: 160px;
    }

    .step-remove {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 18px;
      padding: 2px 6px;
      line-height: 1;
    }

    .step-remove:hover { color: #e11d48; }

    .add-step {
      margin-top: 8px;
      display: flex;
      gap: 6px;
    }

    .add-step button {
      padding: 6px 12px;
      font-size: 13px;
      border: 1px dashed #aaa;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      color: #555;
    }

    .add-step button:hover {
      border-color: #2563eb;
      color: #2563eb;
    }

    /* --- Results --- */

    .results-bar {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      font-size: 13px;
    }

    th, td {
      text-align: left;
      padding: 6px 10px;
      border-bottom: 1px solid #e0e0e0;
      white-space: nowrap;
    }

    th {
      background: #333;
      color: #fff;
      position: sticky;
      top: 0;
    }

    tr:hover td { background: #f0f7ff; }

    .dim { color: #999; }

    /* --- Columns picker --- */

    .columns-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 14px;
    }

    .columns-grid label {
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>DrawTabData Explorer</h1>
  <div class="pipeline" id="pipeline"></div>
  <div class="add-step" id="add-step"></div>
  <div class="results-bar" id="results-bar"></div>
  <div class="table-wrap">
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
